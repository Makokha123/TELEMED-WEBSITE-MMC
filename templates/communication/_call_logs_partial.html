<!-- Call Log trigger button -->
<div class="d-flex justify-content-end mb-2">
  <button id="openCallLogsBtn" class="btn btn-sm btn-outline-primary">Call Log</button>
</div>

<!-- Modal for Call Logs -->
<div class="modal fade" id="callLogsModal" tabindex="-1" aria-labelledby="callLogsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="callLogsModalLabel">Call Logs</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-3">
        <div id="callLogsComponent" class="p-0">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h5 class="m-0">Call Logs</h5>
      <small class="text-muted">Recent calls and history — organized for quick review</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <input id="callSearch" class="form-control form-control-sm" placeholder="Search by name or note" style="min-width:220px;" />
      <div class="btn-group">
        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">Filter</button>
        <ul class="dropdown-menu dropdown-menu-end p-2">
          <label class="d-block small mb-1">Type</label>
          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-sm btn-outline-primary call-filter" data-filter="all">All</button>
            <button class="btn btn-sm btn-outline-primary call-filter" data-filter="incoming">Incoming</button>
            <button class="btn btn-sm btn-outline-primary call-filter" data-filter="outgoing">Outgoing</button>
            <button class="btn btn-sm btn-outline-danger call-filter" data-filter="missed">Missed</button>
            <button class="btn btn-sm btn-outline-warning call-filter" data-filter="declined">Declined</button>
          </div>
        </ul>
      </div>
    </div>
  </div>

  <div id="callLogsList" class="call-logs-list">
    <div class="text-muted">Loading call logs...</div>
  </div>

  <div class="mt-3 d-flex justify-content-between align-items-center">
    <div class="small text-muted" id="callLogsSummary">&nbsp;</div>
    <div>
      <button id="callLogsRefresh" class="btn btn-sm btn-outline-secondary">Refresh</button>
    </div>
  </div>
        </div>
      </div>
    </div>
  </div>
</div>

</div>

<script>
  (function(){
    const searchEl = document.getElementById('callSearch');
    const listEl = document.getElementById('callLogsList');
    const refreshBtn = document.getElementById('callLogsRefresh');
    const summaryEl = document.getElementById('callLogsSummary');
    const modalEl = document.getElementById('callLogsModal');
    const openBtn = document.getElementById('openCallLogsBtn');
    let activeFilter = 'all';
    let cached = [];

    function timeAgo(iso){
      try{
        const s = Math.floor((Date.now() - new Date(iso))/1000);
        if (s < 60) return s + 's';
        if (s < 3600) return Math.floor(s/60) + 'm';
        if (s < 86400) return Math.floor(s/3600) + 'h';
        if (s < 172800) return 'Yesterday';
        return Math.floor(s/86400) + 'd';
      }catch(e){ return ''; }
    }

    function formatDuration(sec){
      if (!sec) return '-';
      const s = Math.max(0, Math.floor(sec));
      const m = Math.floor(s/60);
      const r = s % 60;
      return m > 0 ? `${m}m ${r}s` : `${r}s`;
    }

    function avatarHtml(item){
      if (item.remote_user_avatar){
        return `<div class="call-avatar"><img src="${item.remote_user_avatar}" alt="avatar"/></div>`;
      }
      const initials = (item.remote_user_name||'U').split(' ').map(s=>s[0]).slice(0,2).join('').toUpperCase();
      return `<div class="call-avatar call-avatar-initials">${initials}</div>`;
    }

    function statusBadge(status){
      const s = (status||'').toLowerCase();
      if (s === 'missed') return `<span class="badge bg-danger">Missed</span>`;
      if (s === 'declined' || s === 'rejected') return `<span class="badge bg-warning text-dark">${status}</span>`;
      if (s === 'completed' || s === 'ended' || s === 'connected') return `<span class="badge bg-success">${status}</span>`;
      return `<span class="badge bg-secondary">${status||'Unknown'}</span>`;
    }

    function renderGroup(title, items){
      const container = document.createElement('div');
      container.className = 'call-group mb-3';
      const header = document.createElement('div');
      header.className = 'd-flex justify-content-between align-items-center mb-2';
      header.innerHTML = `<div class="fw-semibold">${title}</div><div class="small text-muted">${items.length} item${items.length>1?'s':''}</div>`;
      container.appendChild(header);
      items.forEach(i => container.appendChild(renderItem(i)));
      return container;
    }

    function renderItem(c){
      const el = document.createElement('div');
      el.className = 'call-log-item d-flex align-items-center p-2 mb-2';
      el.innerHTML = `
        ${avatarHtml(c)}
        <div class="flex-grow-1 ms-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="fw-bold">${c.remote_user_name || 'Unknown'}</div>
              <div class="small text-muted">${c.call_note||c.type||'Call'}</div>
            </div>
            <div class="text-end small">
              <div class="text-muted">${timeAgo(c.created_at)}</div>
              <div class="mt-1">${statusBadge(c.status)}</div>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-2 small text-muted">
            <div><i class="fas ${c.direction === 'outgoing' ? 'fa-arrow-up-right-from-square text-primary' : 'fa-arrow-down-left fa-flip-horizontal text-info'}"></i> ${c.call_type || ''} • ${formatDuration(c.duration)}</div>
            <div>
              <button class="btn btn-sm btn-outline-secondary btn-view" data-id="${c.id}">Details</button>
              <button class="btn btn-sm btn-outline-primary ms-1 btn-redial" data-id="${c.id}">Call</button>
            </div>
          </div>
        </div>`;

      // wire buttons
      el.querySelectorAll('.btn-view').forEach(b=> b.addEventListener('click', ()=> { alert('Show details for call id: '+b.dataset.id); }));
      el.querySelectorAll('.btn-redial').forEach(b=> b.addEventListener('click', ()=> { alert('Start a new call based on log id: '+b.dataset.id); }));
      return el;
    }

    function groupByDate(items){
      const today = new Date();
      const groups = { 'Today': [], 'Yesterday': [], 'Earlier': [] };
      items.forEach(i => {
        const d = new Date(i.created_at);
        const diff = (today - d) / (1000*60*60*24);
        if (diff < 1) groups['Today'].push(i);
        else if (diff < 2) groups['Yesterday'].push(i);
        else groups['Earlier'].push(i);
      });
      return groups;
    }

    async function fetchCallLogs(){
      listEl.innerHTML = '<div class="text-center py-4"><div class="loading-spinner"></div><div class="small text-muted mt-2">Loading call logs...</div></div>';
      try{
        const url = '/api/call_logs';
        const resp = await fetch(url);
        if(!resp.ok) throw new Error('Failed to fetch');
        const data = await resp.json();
        cached = data.call_logs || [];
        applyFilters();
        summaryEl.textContent = `${cached.length} total calls`;
      }catch(e){
        listEl.innerHTML = `<div class="text-danger p-3">Failed to load call logs: ${e.message}</div>`;
      }
    }

    function applyFilters(){
      const q = (searchEl.value||'').toLowerCase().trim();
      const filtered = cached.filter(i => {
        if (activeFilter && activeFilter !== 'all'){
          if ((activeFilter === 'missed') && i.status !== 'missed') return false;
          if ((activeFilter === 'incoming') && i.direction !== 'incoming') return false;
          if ((activeFilter === 'outgoing') && i.direction !== 'outgoing') return false;
          if ((activeFilter === 'declined') && (i.status !== 'declined' && i.status !== 'rejected')) return false;
        }
        if (!q) return true;
        return (i.remote_user_name||'').toLowerCase().includes(q) || (i.call_note||'').toLowerCase().includes(q);
      });

      // empty state
      if (!filtered.length){ listEl.innerHTML = '<div class="text-center text-muted p-4">No calls match your filters.</div>'; return; }

      // group by date
      const groups = groupByDate(filtered);
      listEl.innerHTML = '';
      Object.keys(groups).forEach(k => { if (groups[k] && groups[k].length) listEl.appendChild(renderGroup(k, groups[k])); });
    }

    // wire filter buttons
    document.querySelectorAll('.call-filter').forEach(b=> b.addEventListener('click', ()=> { activeFilter = b.dataset.filter; applyFilters(); }));
    searchEl.addEventListener('input', ()=> applyFilters());
    refreshBtn.addEventListener('click', ()=> fetchCallLogs());

    // Bootstrap modal wiring: open modal and fetch when shown
    try{
      const bsModal = modalEl ? new bootstrap.Modal(modalEl) : null;
      if (openBtn && bsModal){
        openBtn.addEventListener('click', ()=> bsModal.show());
      }
      if (modalEl){
        modalEl.addEventListener('shown.bs.modal', function(){ fetchCallLogs(); });
      }
    }catch(e){ /* ignore if bootstrap not available */ }

    // initial load (preload cache) — optional
    fetchCallLogs();
  })();
</script>
