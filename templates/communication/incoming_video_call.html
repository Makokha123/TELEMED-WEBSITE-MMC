<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Video Call</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .incoming-video-call-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        .call-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="2"/><path d="M30 50 L70 50 M50 30 L50 70" stroke="white" stroke-width="1"/></svg>');
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.05); opacity: 0.2; }
        }

        /* Caller video preview or avatar */
        .caller-video-section {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: auto;
            flex: 1;
        }

        #callerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .caller-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: white;
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5);
            animation: scale-in 0.6s ease-out;
        }

        @keyframes scale-in {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Caller info overlay */
        .caller-info-overlay {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 11;
        }

        .caller-name {
            color: white;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .caller-role {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .call-status {
            color: #4ade80;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .call-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Ringtone indicator */
        .ringtone-icon {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 28px;
            color: #f59e0b;
            z-index: 15;
            animation: ring 0.6s ease-in-out infinite;
        }

        @keyframes ring {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        /* Action buttons */
        .call-actions {
            position: relative;
            z-index: 12;
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding-bottom: 40px;
        }

        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .call-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        .accept-btn {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
        }

        .accept-btn:hover {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .reject-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .reject-btn:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .incoming-video-call-container {
                max-width: 100%;
                border-radius: 0;
            }

            .caller-name {
                font-size: 28px;
            }

            .call-actions {
                gap: 30px;
            }

            .call-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .ringtone-icon {
                top: 15px;
                right: 15px;
                font-size: 24px;
            }

            .close-btn {
                top: 15px;
                left: 15px;
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="incoming-video-call-container">
        <div class="call-background"></div>

        <button class="close-btn" id="closeBtn" onclick="window.close()">
            <i class="fas fa-times"></i>
        </button>

        <div class="ringtone-icon">
            <i class="fas fa-video"></i>
        </div>

        <div class="caller-video-section">
            <video id="callerVideo" playsinline autoplay muted></video>
            <div class="caller-avatar-large" id="callerAvatarLarge">
                <span id="callerInitials">DR</span>
            </div>

            <div class="caller-info-overlay">
                <div class="caller-name" id="callerName">Dr. John Doe</div>
                <div class="caller-role" id="callerRole">Doctor</div>
                <div class="call-status">
                    <span class="dot"></span>
                    <span id="statusText">Calling...</span>
                </div>
            </div>
        </div>

        <div class="call-actions">
            <button class="call-btn reject-btn" id="rejectBtn" title="Reject Call">
                <i class="fas fa-phone"></i>
            </button>
            <button class="call-btn accept-btn" id="acceptBtn" title="Accept Call">
                <i class="fas fa-video"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Get call data
        const callData = JSON.parse(sessionStorage.getItem('incomingCallData') || '{}');
        const appointmentId = callData.appointment_id || new URLSearchParams(window.location.search).get('appointment_id');
        const callerId = callData.caller_id;
        const callerName = callData.caller_name || 'Unknown';
        const callerRole = callData.caller_role || 'Doctor';

        // Initialize Socket.IO
        const socket = io();

        // DOM Elements
        const callerVideo = document.getElementById('callerVideo');
        const callerAvatarLarge = document.getElementById('callerAvatarLarge');
        const callerNameEl = document.getElementById('callerName');
        const callerRoleEl = document.getElementById('callerRole');
        const acceptBtn = document.getElementById('acceptBtn');
        const rejectBtn = document.getElementById('rejectBtn');
        const statusText = document.getElementById('statusText');
        const callerInitials = document.getElementById('callerInitials');

        // Set caller info
        callerNameEl.textContent = callerName;
        callerRoleEl.textContent = callerRole;

        // Generate initials
        const names = callerName.split(' ');
        const initials = names.map(n => n.charAt(0)).join('').substring(0, 2).toUpperCase();
        callerInitials.textContent = initials;

        // Play ringtone using Web Audio API
        function playRingtone() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();

                oscillator.connect(gain);
                gain.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';

                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);

                setTimeout(playRingtone, 2000);
            } catch (e) {
                console.log('Audio context error:', e);
            }
        }


        // Start ringtone
        playRingtone();

        // Accept video call
        acceptBtn.addEventListener('click', () => {
            statusText.textContent = 'Accepted';
            
            // Signal acceptance to parent window via sessionStorage
            sessionStorage.setItem('callResponse', 'accepted');
            
            // Store call state
            sessionStorage.setItem('activeVideoCall', JSON.stringify({
                appointment_id: appointmentId,
                caller_id: callerId,
                callee_id: callerId
            }));
            
            setTimeout(() => {
                window.location.href = `/video-call/${appointmentId}`;
            }, 1000);
        });

        // Reject video call
        rejectBtn.addEventListener('click', () => {
            statusText.textContent = 'Declined';
            
            // Signal rejection to parent window via sessionStorage
            sessionStorage.setItem('callResponse', 'rejected');
            
            setTimeout(() => {
                window.close();
            }, 1000);
        });

        // Handle call timeout
        setTimeout(() => {
            if (statusText.textContent === 'Calling...') {
                statusText.textContent = 'Missed Call';
                
                // Signal timeout to parent window
                sessionStorage.setItem('callResponse', 'timeout');
                
                setTimeout(() => {
                    window.close();
                }, 3000);
            }
        }, 60000); // 60 second timeout
    </script>
</body>
</html>
