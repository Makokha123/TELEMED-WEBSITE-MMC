<!-- Call Logs Modal – shared by doctor, patient, and dashboard views -->
<div class="modal fade" id="callLogsModal" tabindex="-1" aria-labelledby="callLogsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header" style="border-bottom:1px solid #e5e5e5;padding:14px 20px">
        <div>
          <h5 class="modal-title" id="callLogsModalLabel" style="font-weight:700;font-size:18px">📞 Call Logs</h5>
          <small class="text-muted">Your call history — missed, incoming &amp; outgoing</small>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-0">
        <!-- Stats bar -->
        <div id="clStats" class="cl-stats-bar"></div>

        <!-- Controls bar -->
        <div class="cl-controls">
          <div class="cl-search-wrap">
            <i class="fas fa-search cl-search-icon"></i>
            <input id="clSearch" class="cl-search" type="text" placeholder="Search by name..." autocomplete="off">
          </div>

          <div class="cl-filter-group">
            <button class="cl-filter-btn active" data-filter="all">All</button>
            <button class="cl-filter-btn" data-filter="incoming">
              <i class="fas fa-arrow-down"></i> In
            </button>
            <button class="cl-filter-btn" data-filter="outgoing">
              <i class="fas fa-arrow-up"></i> Out
            </button>
            <button class="cl-filter-btn cl-filter-missed" data-filter="missed">
              <i class="fas fa-phone-slash"></i> Missed
            </button>
            <button class="cl-filter-btn" data-filter="declined">Declined</button>
          </div>

          <select id="clTypeFilter" class="cl-type-select">
            <option value="">All Types</option>
            <option value="voice">🎤 Voice</option>
            <option value="video">📹 Video</option>
          </select>
        </div>

        <!-- Call list -->
        <div id="clList" class="cl-list">
          <div class="cl-loading">
            <div class="spinner-border spinner-border-sm text-primary"></div>
            <span>Loading call logs...</span>
          </div>
        </div>

        <!-- Pagination -->
        <div id="clPagination" class="cl-pagination"></div>
      </div>

      <div class="modal-footer" style="border-top:1px solid #e5e5e5;padding:8px 16px">
        <span class="small text-muted me-auto" id="clSummary">Ready</span>
        <button id="clRefresh" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-sync-alt me-1"></i>Refresh
        </button>
      </div>
    </div>
  </div>
</div>

<style>
/* ── Call Logs Modal Styles ─────────────────────────────── */
#callLogsModal .cl-stats-bar{display:flex;gap:8px;padding:12px 16px;background:#f8f9fa;border-bottom:1px solid #e9ecef;overflow-x:auto}
#callLogsModal .cl-stat{flex:1;min-width:80px;text-align:center;padding:8px;background:#fff;border-radius:8px;border:1px solid #e9ecef}
#callLogsModal .cl-stat-num{display:block;font-weight:700;font-size:16px;color:#111b21}
#callLogsModal .cl-stat-success{color:#25d366}
#callLogsModal .cl-stat-danger{color:#e74c3c}
#callLogsModal .cl-stat-label{font-size:11px;color:#667781;text-transform:uppercase;letter-spacing:.5px}

/* Controls */
#callLogsModal .cl-controls{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid #e9ecef;flex-wrap:wrap}
#callLogsModal .cl-search-wrap{position:relative;flex:1;min-width:140px}
#callLogsModal .cl-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:13px}
#callLogsModal .cl-search{width:100%;border:1px solid #dee2e6;border-radius:20px;padding:6px 12px 6px 32px;font-size:13px;outline:none;transition:border-color .2s}
#callLogsModal .cl-search:focus{border-color:#0d6efd}
#callLogsModal .cl-filter-group{display:flex;gap:4px;flex-wrap:wrap}
#callLogsModal .cl-filter-btn{border:1px solid #dee2e6;background:#fff;border-radius:16px;padding:4px 12px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
#callLogsModal .cl-filter-btn:hover{background:#f0f2f5}
#callLogsModal .cl-filter-btn.active{background:#0d6efd;color:#fff;border-color:#0d6efd}
#callLogsModal .cl-filter-missed.active{background:#e74c3c;border-color:#e74c3c}
#callLogsModal .cl-type-select{border:1px solid #dee2e6;border-radius:8px;padding:4px 8px;font-size:12px;outline:none;background:#fff}

/* List */
#callLogsModal .cl-list{max-height:400px;overflow-y:auto;padding:0 12px}
#callLogsModal .cl-loading,.cl-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;gap:8px;color:#667781}
#callLogsModal .cl-group{margin-bottom:16px}
#callLogsModal .cl-group-header{display:flex;justify-content:space-between;align-items:center;padding:6px 4px;font-weight:600;font-size:13px;color:#333;border-bottom:2px solid #e9ecef;margin-bottom:6px}
#callLogsModal .cl-group-count{font-size:11px;color:#667781;font-weight:400}

/* Call item */
#callLogsModal .cl-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;border:1px solid transparent;cursor:default;transition:all .15s}
#callLogsModal .cl-item:hover{background:#f8f9fa;border-color:#e5e5e5}
#callLogsModal .cl-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
#callLogsModal .cl-avatar img{width:100%;height:100%;object-fit:cover}
#callLogsModal .cl-initials{color:#fff;font-weight:700;font-size:15px}
#callLogsModal .cl-info{flex:1;min-width:0}
#callLogsModal .cl-row-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
#callLogsModal .cl-name{font-weight:600;font-size:14px;color:#111b21;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#callLogsModal .cl-row-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
#callLogsModal .cl-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:#667781}
#callLogsModal .cl-dur{font-weight:500}
#callLogsModal .cl-actions{display:flex;gap:4px}
#callLogsModal .cl-btn{border:none;background:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:13px;transition:background .15s}
#callLogsModal .cl-btn-detail{color:#6c757d}
#callLogsModal .cl-btn-detail:hover{background:#e9ecef}
#callLogsModal .cl-btn-call{color:#fff;background:linear-gradient(135deg,#0d6efd,#0b5ed7);border-radius:50%;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;font-size:12px}
#callLogsModal .cl-btn-call:hover{background:linear-gradient(135deg,#0b5ed7,#0a58ca)}

/* Badges */
#callLogsModal .cl-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
#callLogsModal .cl-badge-success{background:#d4edda;color:#155724}
#callLogsModal .cl-badge-danger{background:#f8d7da;color:#721c24}
#callLogsModal .cl-badge-warning{background:#fff3cd;color:#856404}
#callLogsModal .cl-badge-info{background:#d1ecf1;color:#0c5460}
#callLogsModal .cl-badge-secondary{background:#e2e3e5;color:#383d41}

/* Pagination */
#callLogsModal .cl-pagination{display:flex;justify-content:center;gap:4px;padding:8px 16px}
#callLogsModal .cl-page-btn{border:1px solid #dee2e6;background:#fff;border-radius:4px;padding:2px 8px;font-size:12px;cursor:pointer}
#callLogsModal .cl-page-btn.active{background:#0d6efd;color:#fff;border-color:#0d6efd}
#callLogsModal .cl-page-dots{padding:2px 4px;font-size:12px;color:#aaa}

/* Detail modal */
.cl-detail-grid{display:grid;gap:8px}
.cl-detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.cl-detail-label{font-weight:600;color:#555}
.cl-quality-grid{display:grid;gap:6px}
.cl-quality-item{display:flex;gap:12px;font-size:12px;color:#555;padding:4px 0;border-bottom:1px solid #f5f5f5}

/* Responsive */
@media(max-width:576px){
  #callLogsModal .cl-controls{flex-direction:column}
  #callLogsModal .cl-stats-bar{gap:4px;padding:8px}
  #callLogsModal .cl-stat{min-width:60px;padding:4px}
  #callLogsModal .cl-stat-num{font-size:14px}
}
</style>

<script src="{{ url_for('static', filename='js/call-logs.js') }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    CallLogs.init({
      userId: {{ current_user.id | tojson }},
      userRole: {{ current_user.role | tojson }},
      csrfToken: document.querySelector('meta[name=csrf-token]')?.getAttribute('content') || ''
    });
  });
</script>
