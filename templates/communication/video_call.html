<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-call-container {
            width: 100%;
            height: 100vh;
            background: #000;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 0;
            position: relative;
        }

        /* Remote video (large) */
        .remote-video-section {
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remote-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
        }

        .placeholder-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .placeholder-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Local video (small PiP) */
        .local-video-section {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            z-index: 20;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .local-video-section:active {
            cursor: grabbing;
        }

        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .local-video-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        /* Chat sidebar */
        .chat-sidebar {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #333;
            color: white;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            word-wrap: break-word;
            max-width: 95%;
        }

        .chat-message.sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
        }

        .chat-message.received {
            background: #333;
            color: #e5e5e5;
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            background: #333;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .chat-input-area input::placeholder {
            color: #999;
        }

        .chat-input-area input:focus {
            outline: none;
            background: #444;
        }

        .chat-input-area button {
            background: #667eea;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background: #764ba2;
        }

        #chatInput {
            width: 100%;
        }

        /* Caller info overlay */
        .call-info-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 10;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .caller-name-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .caller-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }

        .caller-avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caller-name {
            font-weight: 600;
            font-size: 14px;
        }

        .call-duration {
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .call-duration .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Call controls */
        .call-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: #4ade80;
        }

        .control-btn.disabled {
            background: rgba(255, 255, 255, 0.1);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .end-call-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
        }

        .end-call-btn:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
        }

        /* Responsive - mobile view */
        @media (max-width: 768px) {
            .video-call-container {
                grid-template-columns: 1fr;
            }

            .local-video-section {
                width: 150px;
                height: 100px;
            }

            .call-controls {
                gap: 10px;
                padding: 12px 15px;
            }

            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }
        }

        /* Screen share indicator */
        .screen-share-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            z-index: 15;
            display: none;
        }

        .screen-share-indicator.active {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(59, 130, 246, 0.6);
        }

        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 6px;
            color: #4ade80;
            font-size: 12px;
            z-index: 15;
        }
    </style>
    <style>
        /* Tap-to-enable prompt (mobile autoplay fallback) */
        .enable-media-prompt {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 60;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .enable-media-card {
            background: rgba(255,255,255,0.06);
            color: #fff;
            padding: 18px 22px;
            border-radius: 12px;
            text-align: center;
            max-width: 320px;
            width: 100%;
        }

        .enable-media-card p { margin-bottom: 12px; font-size: 15px; }

        .enable-media-btn {
            background: #667eea;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* Further narrow-screen tweaks: hide chat for compact mobile view */
        @media (max-width: 600px) {
            .chat-sidebar { display: none; }
            .local-video-section { width: 140px; height: 100px; bottom: 14px; right: 14px; }
            .call-controls { left: 8px; right: 8px; transform: none; width: auto; justify-content: center; }
            #remoteVideo { object-fit: contain; }
            .enable-media-prompt { display: flex; }
        }
    </style>
</head>
<body>
    <div class="video-call-container">
        <!-- Remote video -->
        <div class="remote-video-section">
            <video id="remoteVideo" playsinline autoplay></video>
            <div class="remote-placeholder" id="remotePlaceholder" style="display: none;">
                <div class="placeholder-avatar" id="remoteAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div>Waiting for video...</div>
            </div>
        </div>

        <!-- Call info and controls overlay -->
        <div class="call-info-overlay">
            <div class="caller-avatar-small" id="remoteAvatarSmall">
                <i class="fas fa-user"></i>
            </div>
            <div class="caller-name-info">
                <div class="caller-name" id="remoteNameInfo">Caller</div>
                <div class="call-duration">
                    <span class="dot"></span>
                    <span id="callDuration">00:00</span>
                </div>
            </div>
        </div>

        <div class="connection-status" id="connectionStatus">
            Connecting...
        </div>

        <div class="screen-share-indicator" id="screenShareIndicator">
            <i class="fas fa-share-square"></i>
            <span>Screen sharing</span>
        </div>

        <!-- Local video (PiP) -->
        <div class="local-video-section" id="localVideoSection" draggable="true">
            <video id="localVideo" playsinline autoplay muted></video>
            <div class="local-video-placeholder" id="localPlaceholder" style="display: none;">
                <i class="fas fa-video"></i>
            </div>
        </div>

        <!-- Chat sidebar -->
        <div class="chat-sidebar">
            <div class="chat-header">Chat</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button id="sendChatBtn" title="Send">
                    <i class="fas fa-paper-plane"></i>
                </button>
                <button id="attachFileBtn" title="Attach file">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="file" id="fileInput" style="display: none;">
            </div>
        </div>

        <!-- Call controls -->
        <div class="call-controls">
            <button class="control-btn" id="toggleMicBtn" title="Toggle Microphone">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn" id="toggleVideoBtn" title="Toggle Camera">
                <i class="fas fa-video"></i>
            </button>
            <button class="control-btn" id="screenshareBtn" title="Share Screen">
                <i class="fas fa-share-square"></i>
            </button>
            <button class="control-btn end-call-btn" id="endCallBtn" title="End Call">
                <i class="fas fa-phone"></i>
            </button>
        </div>
    </div>

    <!-- Hidden user data -->
    <input type="hidden" id="currentUserId" value="{{ current_user.id }}">
    <input type="hidden" id="currentUserFirstName" value="{{ current_user.first_name }}">
    <input type="hidden" id="currentUserLastName" value="{{ current_user.last_name }}">
    <input type="hidden" id="currentUserProfilePic" value="{{ current_user.profile_picture_url or '' }}">
    <input type="hidden" id="currentUserRole" value="{{ current_user.role }}">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Get appointment ID from URL
        const appointmentId = window.location.pathname.split('/').pop();
        
        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const localPlaceholder = document.getElementById('localPlaceholder');
        const remotePlaceholder = document.getElementById('remotePlaceholder');
        const toggleMicBtn = document.getElementById('toggleMicBtn');
        const toggleVideoBtn = document.getElementById('toggleVideoBtn');
        const screenshareBtn = document.getElementById('screenshareBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const callDuration = document.getElementById('callDuration');
        const connectionStatus = document.getElementById('connectionStatus');
        const screenShareIndicator = document.getElementById('screenShareIndicator');
        const localVideoSection = document.getElementById('localVideoSection');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');
        const attachFileBtn = document.getElementById('attachFileBtn');
        const fileInput = document.getElementById('fileInput');
        const remoteNameInfo = document.getElementById('remoteNameInfo');
        const remoteAvatarSmall = document.getElementById('remoteAvatarSmall');
        const remoteAvatar = document.getElementById('remoteAvatar');

        // State
        let localStream = null;
        let peerConnection = null;
        let remoteStream = null;
        let micEnabled = true;
        let videoEnabled = true;
        let isScreenSharing = false;
        let callStartTime = null;
        // Explicit Socket.IO options for more robust reconnection and transport fallbacks
        if (!window.socket) {
            try {
                window.socket = io({
                    transports: ['websocket', 'polling'],
                    reconnection: true,
                    reconnectionAttempts: 10,
                    reconnectionDelay: 1000,
                    timeout: 20000
                });
            } catch (e) {
                console.error('Socket.IO initialization failed', e);
                window.socket = null;
            }
        }
        var socket = window.socket;
        if (socket) {
            socket.on('connect', () => console.log('Socket.IO connected', socket.id));
            socket.on('connect_error', (err) => {
                console.error('Socket.IO connect_error', err);
                connectionStatus.textContent = 'Socket connection error';
                connectionStatus.style.color = '#ef4444';
            });
            socket.on('reconnect_attempt', (attempt) => console.log('Socket.IO reconnect attempt', attempt));
        }
        let remoteUserName = 'Caller';
        let remoteUserAvatar = null;

        // Chat functions
        function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Add message to UI (sent)
            addChatMessageToUI(message, 'sent');
            
            // Emit via Socket.IO
            socket.emit('call_chat_message', {
                appointment_id: appointmentId,
                message: message
            });

            chatInput.value = '';
            chatInput.focus();
        }

        function addChatMessageToUI(message, type) {
            const msgElement = document.createElement('div');
            msgElement.className = `chat-message ${type}`;
            msgElement.textContent = message;
            chatMessages.appendChild(msgElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                socket.emit('call_file_share', {
                    appointment_id: appointmentId,
                    file_name: file.name,
                    file_data: event.target.result,
                    file_size: file.size
                });

                // Add notification to chat
                addChatMessageToUI(`📎 Shared file: ${file.name}`, 'sent');
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        }

        // Chat event listeners
        sendChatBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendChatMessage();
            }
        });
        attachFileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileUpload);

        // WebRTC Configuration
        const rtcConfig = {
            iceServers: [
                { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
            ]
        };

        // Initialize WebRTC
        async function initializeCall() {
            try {
                // Check browser compatibility
                const mediaDevices = navigator.mediaDevices || (navigator.getUserMedia && {
                    getUserMedia: (constraints) => {
                        return new Promise((resolve, reject) => {
                            navigator.getUserMedia(constraints, resolve, reject);
                        });
                    }
                });

                if (!mediaDevices || !mediaDevices.getUserMedia) {
                    connectionStatus.textContent = 'WebRTC not supported';
                    connectionStatus.style.color = '#ef4444';
                    return;
                }

                // Enhanced audio/video constraints with fallbacks for all devices
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                };

                // Get local media stream with fallback strategy
                try {
                    localStream = await mediaDevices.getUserMedia(constraints);
                } catch (error) {
                    console.warn('High quality constraints failed, trying standard:', error);
                    // Fallback: try with minimal constraints
                    const fallbackConstraints = {
                        video: true,
                        audio: true
                    };
                    try {
                        localStream = await mediaDevices.getUserMedia(fallbackConstraints);
                    } catch (fallbackError) {
                        console.error('All media access attempts failed:', fallbackError);
                        
                        // Detailed error messages for users
                        if (fallbackError.name === 'NotAllowedError') {
                            connectionStatus.textContent = 'Permission denied. Please allow camera/microphone access in browser settings.';
                        } else if (fallbackError.name === 'NotFoundError') {
                            connectionStatus.textContent = 'No camera/microphone found. Check device connections.';
                        } else if (fallbackError.name === 'NotReadableError') {
                            connectionStatus.textContent = 'Camera/microphone in use. Close other apps using them.';
                        } else {
                            connectionStatus.textContent = 'Failed to access camera/microphone: ' + fallbackError.name;
                        }
                        connectionStatus.style.color = '#ef4444';
                        return;
                    }
                }

                localVideo.srcObject = localStream;
                localPlaceholder.style.display = 'none';

                // Create peer connection
                peerConnection = new RTCPeerConnection(rtcConfig);

                // Add local stream tracks with audio gain control
                localStream.getTracks().forEach(track => {
                    if (track.kind === 'audio') {
                        // Ensure audio track is enabled and set constraints
                        track.enabled = true;
                        console.log('Local audio track added:', track.label);
                    }
                    peerConnection.addTrack(track, localStream);
                });

                // Handle remote stream
                peerConnection.ontrack = (event) => {
                    console.log('Remote track received:', event.track.kind);
                    if (event.track.kind === 'audio') {
                        // Create audio element for remote audio with proper playback
                        let remoteAudio = document.getElementById('remoteAudio');
                        if (!remoteAudio) {
                            remoteAudio = document.createElement('audio');
                            remoteAudio.id = 'remoteAudio';
                            remoteAudio.autoplay = true;
                            remoteAudio.playsinline = true;
                            document.body.appendChild(remoteAudio);
                        }
                        remoteAudio.srcObject = event.streams[0];
                        remoteAudio.volume = 1;
                        // Try to start playback; if blocked, show tap-to-enable prompt
                        try {
                            remoteAudio.play().catch((e) => {
                                console.warn('Remote audio autoplay blocked:', e);
                                showEnableMediaPrompt();
                            });
                        } catch (err) {
                            console.warn('Error attempting remote audio play:', err);
                            showEnableMediaPrompt();
                        }
                        console.log('Remote audio track connected:', event.track.label);
                    } else {
                        remoteStream = event.streams[0];
                        remoteVideo.srcObject = remoteStream;
                        remotePlaceholder.style.display = 'none';
                        // Try to play remote video (may be blocked on mobile)
                        try {
                            remoteVideo.play().catch((e) => {
                                console.warn('Remote video autoplay blocked:', e);
                                showEnableMediaPrompt();
                            });
                        } catch (err) {
                            console.warn('Error attempting remote video play:', err);
                            showEnableMediaPrompt();
                        }
                    }
                };

                // Handle ICE candidates
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('webrtc_ice_candidate', {
                            appointment_id: appointmentId,
                            candidate: event.candidate
                        });
                    }
                };

                // Handle connection state changes
                peerConnection.onconnectionstatechange = () => {
                    const state = peerConnection.connectionState;
                    updateConnectionStatus(state);
                    if (state === 'connected' && !callStartTime) {
                        callStartTime = Date.now();
                        updateCallDuration();
                    }
                };

                // Join video room
                socket.emit('join_video_room', { appointment_id: appointmentId });

                // Emit current user info
                socket.emit('call_user_info', {
                    appointment_id: appointmentId,
                    user_id: document.getElementById('currentUserId')?.value || 'unknown',
                    first_name: document.getElementById('currentUserFirstName')?.value || 'User',
                    last_name: document.getElementById('currentUserLastName')?.value || '',
                    profile_picture_url: document.getElementById('currentUserProfilePic')?.value || null
                });

                // Do not create an offer here. The server will notify existing participants
                // via `user_joined_video_room` and those participants will create the offer.
                // Start call duration timer when the connection is established (ontrack/onconnectionstatechange).
                connectionStatus.textContent = 'Ready';
                connectionStatus.style.color = '#f59e0b';

            } catch (error) {
                console.error('Error initializing call:', error);
                connectionStatus.textContent = 'Connection failed';
                connectionStatus.style.color = '#ef4444';
            }
        }

        // Update call duration
        function updateCallDuration() {
            if (!callStartTime) return;
            
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            callDuration.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            setTimeout(updateCallDuration, 1000);
        }

        // Update connection status
        function updateConnectionStatus(state) {
            const statusMap = {
                'new': 'Connecting...',
                'connecting': 'Connecting...',
                'connected': 'Connected',
                'disconnected': 'Disconnected',
                'failed': 'Connection failed',
                'closed': 'Call ended'
            };
            
            connectionStatus.textContent = statusMap[state] || state;
            connectionStatus.style.color = state === 'connected' ? '#4ade80' : '#ef4444';
        }

        // Toggle microphone
        toggleMicBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getAudioTracks().forEach(track => {
                    track.enabled = !track.enabled;
                    micEnabled = track.enabled;
                });

                toggleMicBtn.classList.toggle('active', micEnabled);
                toggleMicBtn.innerHTML = micEnabled 
                    ? '<i class="fas fa-microphone"></i>' 
                    : '<i class="fas fa-microphone-slash"></i>';
            }
        });

        // Toggle video
        toggleVideoBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getVideoTracks().forEach(track => {
                    track.enabled = !track.enabled;
                    videoEnabled = track.enabled;
                });

                toggleVideoBtn.classList.toggle('active', videoEnabled);
                localVideo.style.opacity = videoEnabled ? '1' : '0.3';
            }
        });

        // Screen share
        screenshareBtn.addEventListener('click', async () => {
            try {
                if (!isScreenSharing) {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: 'always' },
                        audio: false
                    });

                    const videoTrack = screenStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');

                    if (sender) {
                        await sender.replaceTrack(videoTrack);
                    }

                    isScreenSharing = true;
                    screenshareBtn.classList.add('active');
                    screenShareIndicator.classList.add('active');

                    videoTrack.onended = async () => {
                        const userStream = await navigator.mediaDevices.getUserMedia({ video: true });
                        const userVideoTrack = userStream.getVideoTracks()[0];
                        await sender.replaceTrack(userVideoTrack);
                        
                        isScreenSharing = false;
                        screenshareBtn.classList.remove('active');
                        screenShareIndicator.classList.remove('active');
                    };
                } else {
                    const userStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const userVideoTrack = userStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');

                    if (sender) {
                        await sender.replaceTrack(userVideoTrack);
                    }

                    isScreenSharing = false;
                    screenshareBtn.classList.remove('active');
                    screenShareIndicator.classList.remove('active');
                }
            } catch (error) {
                console.error('Error with screen sharing:', error);
            }
        });

        // End call
        endCallBtn.addEventListener('click', () => {
            socket.emit('end_video_call', { appointment_id: appointmentId });
            closeCall();
        });

        // Close call
        function closeCall() {
            if (peerConnection) {
                peerConnection.close();
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            socket.emit('leave_video_room', { appointment_id: appointmentId });
            
            setTimeout(() => {
                window.location.href = `/communication/${appointmentId}`;
            }, 500);
        }

        // Socket.IO event handlers
        // When another user joins, initiate offer (so only the joiner/other side creates the offer)
        socket.on('user_joined_video_room', async (data) => {
            try {
                // Avoid creating multiple offers
                if (!peerConnection) return;
                if (peerConnection.signalingState === 'stable') {
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('webrtc_offer', {
                        appointment_id: appointmentId,
                        offer: offer
                    });
                } else {
                    console.log('Skipping offer creation due to signalingState=', peerConnection.signalingState);
                }
            } catch (err) {
                console.error('Error creating offer on user_joined_video_room:', err);
            }
        });

        // Handle incoming WebRTC offer from remote and reply with an answer
        socket.on('webrtc_offer', async (data) => {
            try {
                if (!peerConnection) return;
                const remoteDesc = new RTCSessionDescription(data.offer);
                await peerConnection.setRemoteDescription(remoteDesc);

                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit('webrtc_answer', {
                    appointment_id: appointmentId,
                    answer: answer
                });
            } catch (error) {
                console.error('Error handling incoming offer:', error);
            }
        });

        socket.on('webrtc_answer', async (data) => {
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } catch (error) {
                console.error('Error setting remote description:', error);
            }
        });

        socket.on('webrtc_ice_candidate', async (data) => {
            try {
                if (data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            } catch (error) {
                console.error('Error adding ICE candidate:', error);
            }
        });

        socket.on('video_call_ended', (data) => {
            try {
                // perform local cleanup
                closeCall();

                // role-aware redirect: doctor -> dashboard, patient -> testimonial page
                const role = document.getElementById('currentUserRole')?.value || '';
                const appointment_id = data?.appointment_id || appointmentId;
                const doctor_user_id = data?.doctor_user_id || null;

                // small delay to ensure socket leave and cleanup finished
                setTimeout(() => {
                    if (role === 'doctor') {
                        window.location.href = '/doctor/dashboard';
                    } else if (role === 'patient') {
                        // Redirect patient to testimonial submission page for this appointment
                        window.location.href = `/appointments/${appointment_id}/testimonial`;
                    } else {
                        // Fallback to communication page
                        window.location.href = `/communication/${appointment_id}`;
                    }
                }, 400);
            } catch (err) {
                console.error('Error handling video_call_ended redirect:', err);
                closeCall();
            }
        });

        // Chat message handler
        socket.on('call_chat_message', (data) => {
            addChatMessageToUI(data.message, 'received');
        });

        // File share handler
        socket.on('call_file_share', (data) => {
            addChatMessageToUI(`📎 ${data.sender_name} shared: ${data.file_name}`, 'received');
            const link = document.createElement('a');
            link.href = data.file_data;
            link.download = data.file_name;
            link.click();
        });

        // User info handler
        socket.on('call_user_info', (data) => {
            remoteUserName = `${data.first_name} ${data.last_name}`;
            remoteUserAvatar = data.profile_picture_url;
            remoteNameInfo.textContent = remoteUserName;
            
            if (remoteUserAvatar) {
                remoteAvatarSmall.innerHTML = `<img src="${remoteUserAvatar}" alt="${remoteUserName}">`;
                remoteAvatar.innerHTML = `<img src="${remoteUserAvatar}" alt="${remoteUserName}">`;
            } else {
                const initials = `${data.first_name[0]}${data.last_name[0]}`;
                remoteAvatarSmall.textContent = initials;
                remoteAvatar.textContent = initials;
            }
        });

        // Tap-to-enable prompt helpers
        function showEnableMediaPrompt() {
            let prompt = document.getElementById('enableMediaPrompt');
            if (!prompt) return;
            prompt.style.display = 'flex';
        }

        function hideEnableMediaPrompt() {
            let prompt = document.getElementById('enableMediaPrompt');
            if (!prompt) return;
            prompt.style.display = 'none';
        }

        function enableMediaPlayback() {
            // Try to play remote video/audio elements
            const remoteAudio = document.getElementById('remoteAudio');
            if (remoteAudio) {
                remoteAudio.play().catch(e => console.warn('Play rejected after tap (audio):', e));
            }
            if (remoteVideo && remoteVideo.srcObject) {
                remoteVideo.play().catch(e => console.warn('Play rejected after tap (video):', e));
            }
            hideEnableMediaPrompt();
        }

        // Make local video draggable (PiP)
        let isDragging = false;
        let currentX = 0;
        let currentY = 0;
        let initialX = 0;
        let initialY = 0;

        localVideoSection.addEventListener('dragstart', (e) => {
            isDragging = true;
            initialX = e.clientX - currentX;
            initialY = e.clientY - currentY;
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            if (isDragging) {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                localVideoSection.style.transform = `translate(${currentX}px, ${currentY}px)`;
            }
        });

        document.addEventListener('dragend', () => {
            isDragging = false;
        });

        // Initialize call on load
        window.addEventListener('load', initializeCall);
    </script>
    <!-- Tap-to-enable prompt markup -->
    <div id="enableMediaPrompt" class="enable-media-prompt" style="display:none;">
        <div class="enable-media-card">
            <p>Tap to enable audio/video for this call.</p>
            <button class="enable-media-btn" id="enableMediaBtn">Enable</button>
        </div>
    </div>
    <script>
        // Wire up enable button after DOM is ready
        document.getElementById('enableMediaBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            enableMediaPlayback();
        });
        // If user interacts elsewhere (tap), also try to enable playback
        document.addEventListener('click', function onFirstTap() {
            enableMediaPlayback();
            document.removeEventListener('click', onFirstTap);
        }, { once: true });
    </script>
</body>
</html>
